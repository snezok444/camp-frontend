<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Команды — Лагерь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="requireAuth()">

<div id="sideMenu">
    <a href="dashboard.html">🏠 Главная</a>
    <a href="admin.html" id="adminLink">🛠 Админ</a>
    <a href="teams.html">🧩 Команды</a>
    <a href="rooms.html">🏠 Комнаты</a>
    <a href="users.html">🧒 Участники</a>
    <a href="leaderboard.html">🏅 Таблица лидеров</a>
    <a href="#" onclick="logout()">🚪 Выход</a>
</div>

<header>
    <span>Команды</span>
    <div>
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
        <span class="menu-btn" onclick="toggleTheme()">🌙</span>
    </div>
</header>

<nav>
    <a href="dashboard.html">🏠 Главная</a>
    <a href="admin.html" id="adminLink">🛠 Админ</a>
    <a href="teams.html">🧩 Команды</a>
    <a href="rooms.html">🏠 Комнаты</a>
    <a href="users.html">🧒 Участники</a>
    <a href="leaderboard.html">🏅 Таблица лидеров</a>
    <span class="right">
        <a href="#" onclick="logout()">🚪 Выход</a>
    </span>
</nav>

<div class="container" id="list"></div>

<script src="api.js"></script>
<script src="auth.js"></script>
<script>
get("/teams").then(teams => {
    document.getElementById("list").innerHTML =
        teams.map(t => `
            <div class="card">
                <h3>${t.name}</h3>
                <p>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="none">
                      <circle cx="12" cy="12" r="10" fill="#FFD966"/>
                      <circle cx="12" cy="12" r="8" fill="#F4C542"/>
                      <polygon points="12,7 13.8,10.8 18,11.2 14.8,13.8 15.8,17.8 12,15.8 8.2,17.8 9.2,13.8 6,11.2 10.2,10.8" fill="#FFEFA3"/>
                    </svg>
                    Монеты команды: <b>${t.total_coins}</b>
                </p>

                <input class="input" id="amount${t.id}" type="number" placeholder="Сумма">

                <button class="btn" onclick="addCoins(${t.id})">Добавить</button>
                <button class="btn secondary" onclick="removeCoins(${t.id})">Отнять</button>
                <button class="btn danger" onclick="deleteTeam(${t.id})">Удалить</button>
            </div>
        `).join("");
});

function addCoins(id) {
    const amount = Number(document.getElementById("amount" + id).value);
    if (!amount) return;
    post(`/teams/${id}/add`, { amount }).then(() => location.reload());
}

function removeCoins(id) {
    const amount = Number(document.getElementById("amount" + id).value);
    if (!amount) return;
    post(`/teams/${id}/remove`, { amount }).then(() => location.reload());
}

function deleteTeam(id) {
    if (!confirm("Удалить команду?")) return;
    del(`/teams/${id}`).then(() => location.reload());
}

function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("open");
}
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Комнаты — Лагерь</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="requireAuth()">

<div id="sideMenu">
    <a href="dashboard.html">🏠 Главная</a>
    <a href="admin.html" id="adminLink">🛠 Админ</a>
    <a href="teams.html">🧩 Команды</a>
    <a href="rooms.html">🏠 Комнаты</a>
    <a href="users.html">🧒 Участники</a>
    <a href="leaderboard.html">🏅 Таблица лидеров</a>
    <a href="#" onclick="logout()">🚪 Выход</a>
</div>

<header>
    <span>Комнаты</span>
    <div>
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
        <span class="menu-btn" onclick="toggleTheme()">🌙</span>
    </div>
</header>

<nav>
    <a href="dashboard.html">🏠 Главная</a>
    <a href="admin.html" id="adminLink">🛠 Админ</a>
    <a href="teams.html">🧩 Команды</a>
    <a href="rooms.html">🏠 Комнаты</a>
    <a href="users.html">🧒 Участники</a>
    <a href="leaderboard.html">🏅 Таблица лидеров</a>
    <span class="right">
        <a href="#" onclick="logout()">🚪 Выход</a>
    </span>
</nav>

<div class="container" id="list"></div>

<script src="api.js"></script>
<script src="auth.js"></script>
<script>
get("/rooms").then(rooms => {
    document.getElementById("list").innerHTML =
        rooms.map(r => `
            <div class="card">
                <h3>Комната ${r.number}</h3>
                <p>Чистота: <b>${r.cleanliness_rating}</b></p>

                <input class="input" id="rate${r.id}" type="number" min="0" max="10" placeholder="0–10">

                <button class="btn" onclick="rateRoom(${r.id})">Сохранить</button>
                <button class="btn danger" onclick="deleteRoom(${r.id})">Удалить</button>
            </div>
        `).join("");
});

function rateRoom(id) {
    const rating = Number(document.getElementById("rate" + id).value);
    if (rating < 0 || rating > 10) return alert("Оценка 0–10");
    post(`/rooms/${id}/rate`, { rating }).then(() => location.reload());
}

function deleteRoom(id) {
    if (!confirm("Удалить комнату?")) return;
    del(`/rooms/${id}`).then(() => location.reload());
}

function toggleMenu() {
    document.getElementById("sideMenu").classList.toggle("open");
}
function toggleTheme() {
    document.body.classList.toggle("dark");
    localStorage.setItem("theme", document.body.classList.contains("dark") ? "dark" : "light");
}
if (localStorage.getItem("theme") === "dark") {
    document.body.classList.add("dark");
}
</script>

</body>
</html>
